# Local broker (ESP32 connects here on LAN)
listener 1883 0.0.0.0
allow_anonymous true

# Bridge to HiveMQ Cloud — fill in your cluster credentials
connection hivemq-bridge
address YOUR_CLUSTER.s1.eu.hivemq.cloud:8883
bridge_protocol_version mqttv311
bridge_insecure false
remote_username YOUR_USERNAME
remote_password YOUR_PASSWORD
clientid paintmixer-bridge
start_type automatic
try_private false
cleansession true

# Forward both topics both directions
topic mixer/command out 1
topic mixer/status  in  1

