services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paintmixer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

volumes:
  pgdata:
